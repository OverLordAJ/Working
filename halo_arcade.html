<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HALO: Arcade Combat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Courier New', monospace;
}
canvas {
  display: block;
  border: 1px solid #0f04;
  box-shadow: 0 0 40px #0f04, 0 0 80px #0f02;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// =============================================
//  HALO: ARCADE COMBAT  —  Full Game
// =============================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width  = 800;
canvas.height = 500;

// ── AUDIO ──────────────────────────────────────
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function tone(freq, type, dur, vol, freqEnd) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'sine';
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, audioCtx.currentTime + dur);
  g.gain.setValueAtTime(vol || 0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function sfxShoot()  { tone(900,'square',0.08,0.18,300); }
function sfxHit()    { tone(250,'sawtooth',0.15,0.35,60); }
function sfxDeath()  { tone(400,'square',0.4,0.4,50); }
function sfxJump()   { tone(300,'sine',0.12,0.12,600); }
function sfxPickup() { tone(660,'sine',0.1,0.25,1200); }
function sfxWave()   { tone(440,'sine',0.5,0.3,880); }

// ── INPUT ──────────────────────────────────────
const keys = {};
let mouseDown = false;
document.addEventListener('keydown', e => {
  if (!keys[e.code]) {
    ensureAudio();
    keys[e.code] = true;
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      if (gs === 'playing') playerJump();
      else if (gs === 'menu' || gs === 'gameover') startGame();
    }
    if (e.code === 'KeyR' && gs === 'playing') reload();
    if (e.code === 'Enter' && (gs === 'menu' || gs === 'gameover')) startGame();
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('mousedown', () => { ensureAudio(); mouseDown = true; if (gs !== 'playing') startGame(); });
canvas.addEventListener('mouseup',   () => { mouseDown = false; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); ensureAudio(); mouseDown = true; if (gs !== 'playing') startGame(); }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); mouseDown = false; }, { passive: false });

// ── CONSTANTS ──────────────────────────────────
const GRAVITY   = 0.48;
const GROUND_Y  = 418;
const W = canvas.width, H = canvas.height;

// ── PLATFORMS ─────────────────────────────────
const platforms = [
  { x: 0,   y: GROUND_Y, w: W, h: 82 },   // ground
  { x: 140, y: 318, w: 110, h: 12 },
  { x: 410, y: 295, w: 120, h: 12 },
  { x: 620, y: 345, w: 100, h: 12 },
  { x: 40,  y: 370, w: 80,  h: 12 },
  { x: 280, y: 365, w: 90,  h: 12 },
  { x: 560, y: 255, w: 80,  h: 12 },
];

// ── STARS (pre-computed) ───────────────────────
const STARS = Array.from({ length: 90 }, (_, i) => ({
  x: ((i * 137 + 71) % W),
  y: ((i * 97  + 23) % 290),
  r: i % 4 === 0 ? 1.4 : 0.7,
  a: 0.4 + (i % 5) * 0.12,
}));

// ── GAME STATE ─────────────────────────────────
let gs = 'menu';   // menu | playing | wave_clear | gameover
let score = 0, wave = 1, highScore = 0;
let waveTimer = 0;
let shakeX = 0, shakeY = 0, shakeDur = 0;

// ── ENTITIES ───────────────────────────────────
let player, enemies, bullets, eBullets, particles, pickups;

function createPlayer() {
  return {
    x: 380, y: 300, w: 28, h: 48,
    vx: 0, vy: 0, onGround: false,
    facing: 1,
    shield: 100,
    health: 3,
    ammo: 32, maxAmmo: 32,
    reloading: false, reloadTimer: 0,
    lastHit: -9999,
    shootCD: 0,
    walkT: 0,
    invincible: 0,
  };
}

function mkGrunt(x) {
  return {
    type: 'grunt', x, y: GROUND_Y - 34,
    w: 24, h: 34, vx: 0, vy: 0, onGround: false,
    hp: 2, maxHp: 2,
    facing: x < 400 ? 1 : -1,
    shootCD: 80 + Math.random() * 80,
    walkT: 0, dead: false,
  };
}
function mkElite(x) {
  return {
    type: 'elite', x, y: GROUND_Y - 56,
    w: 32, h: 56, vx: 0, vy: 0, onGround: false,
    hp: 6, maxHp: 6,
    facing: x < 400 ? 1 : -1,
    shootCD: 50 + Math.random() * 60,
    walkT: 0, dead: false,
  };
}
function mkHunter(x) {
  return {
    type: 'hunter', x, y: GROUND_Y - 70,
    w: 40, h: 70, vx: 0, vy: 0, onGround: false,
    hp: 12, maxHp: 12,
    facing: x < 400 ? 1 : -1,
    shootCD: 90 + Math.random() * 40,
    walkT: 0, dead: false,
  };
}

function spawnWave(w) {
  enemies = [];
  const g = 2 + w * 2;
  const e = Math.max(0, Math.floor((w - 1) / 2));
  const h = Math.max(0, Math.floor((w - 3) / 3));
  for (let i = 0; i < g; i++) {
    const side = i % 2 === 0;
    enemies.push(mkGrunt(side ? -60 - i * 25 : W + 60 + i * 25));
  }
  for (let i = 0; i < e; i++) {
    const side = i % 2 === 0;
    enemies.push(mkElite(side ? -90 - i * 30 : W + 90 + i * 30));
  }
  for (let i = 0; i < h; i++) {
    const side = i % 2 === 0;
    enemies.push(mkHunter(side ? -100 : W + 100));
  }
}

function startGame() {
  ensureAudio();
  score = 0; wave = 1;
  gs = 'playing';
  player   = createPlayer();
  enemies  = [];
  bullets  = [];
  eBullets = [];
  particles= [];
  pickups  = [];
  spawnWave(wave);
}

// ── PHYSICS ────────────────────────────────────
function physics(ent) {
  ent.vy += GRAVITY;
  ent.x  += ent.vx;
  ent.y  += ent.vy;
  ent.onGround = false;
  for (const p of platforms) {
    if (ent.x + ent.w > p.x && ent.x < p.x + p.w &&
        ent.y + ent.h > p.y && ent.y + ent.h < p.y + p.h + 14 && ent.vy >= 0) {
      ent.y = p.y - ent.h;
      ent.vy = 0;
      ent.onGround = true;
    }
  }
}

function playerJump() {
  if (player.onGround) { player.vy = -12.5; sfxJump(); }
}

function reload() {
  if (!player.reloading && player.ammo < player.maxAmmo) {
    player.reloading  = true;
    player.reloadTimer = 130;
  }
}

function shoot() {
  if (player.shootCD > 0 || player.reloading) return;
  if (player.ammo <= 0) { reload(); return; }
  player.ammo--;
  player.shootCD = 9;
  sfxShoot();
  const bx = player.facing === 1 ? player.x + player.w + 2 : player.x - 2;
  bullets.push({ x: bx, y: player.y + 22, vx: player.facing * 15, vy: 0, life: 55 });
  // muzzle flash
  for (let i = 0; i < 5; i++) spark(bx, player.y + 22, '#ffe844', 2);
}

function enemyShoot(e) {
  const dx = (player.x + 14) - (e.x + e.w / 2);
  const dy = (player.y + 24) - (e.y + e.h / 2);
  const d  = Math.hypot(dx, dy);
  if (d > 700) return;
  const spd  = e.type === 'hunter' ? 5.5 : e.type === 'elite' ? 5 : 4.5;
  const dmg  = e.type === 'hunter' ? 40  : e.type === 'elite' ? 22 : 15;
  const col  = e.type === 'hunter' ? '#00ffcc' : e.type === 'elite' ? '#ff4400' : '#44aaff';
  const r    = e.type === 'hunter' ? 6 : e.type === 'elite' ? 5 : 4;
  eBullets.push({ x: e.x + e.w/2, y: e.y + e.h/2, vx: dx/d*spd, vy: dy/d*spd, life: 90, col, r, dmg });
}

// ── PARTICLES ──────────────────────────────────
function spark(x, y, col, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 2 + Math.random() * 5;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 1.5, life: 20 + Math.random()*20, ml: 40, col, r: 1.5 + Math.random()*2.5 });
  }
}

function shake(amt, dur) { shakeX = amt; shakeY = amt; shakeDur = dur; }

// ── UPDATE ─────────────────────────────────────
function update() {
  if (gs !== 'playing' && gs !== 'wave_clear') return;

  // Screen shake
  if (shakeDur > 0) { shakeX = (Math.random()-.5)*7; shakeY = (Math.random()-.5)*7; shakeDur--; }
  else              { shakeX = 0; shakeY = 0; }

  if (gs === 'wave_clear') {
    waveTimer--;
    if (waveTimer <= 0) { wave++; spawnWave(wave); gs = 'playing'; sfxWave(); }
    return;
  }

  // ── Player movement
  if (keys['KeyA'] || keys['ArrowLeft'])  { player.vx = -5.2; player.facing = -1; }
  else if (keys['KeyD'] || keys['ArrowRight']) { player.vx = 5.2; player.facing = 1; }
  else { player.vx *= 0.68; if (Math.abs(player.vx) < 0.1) player.vx = 0; }

  if (player.vx !== 0 && player.onGround) player.walkT++;

  // Shoot on click/hold
  if (mouseDown) shoot();

  // Reload
  if (player.reloading) { player.reloadTimer--; if (player.reloadTimer <= 0) { player.reloading = false; player.ammo = player.maxAmmo; } }

  player.shootCD    = Math.max(0, player.shootCD - 1);
  player.invincible = Math.max(0, player.invincible - 1);

  physics(player);
  player.x = Math.max(0, Math.min(W - player.w, player.x));

  // Shield regen
  if (Date.now() - player.lastHit > 3200 && player.shield < 100)
    player.shield = Math.min(100, player.shield + 0.45);

  // ── Enemies
  for (const e of enemies) {
    if (e.dead) continue;
    const dx   = (player.x + 14) - (e.x + e.w/2);
    const spd  = e.type === 'hunter' ? 0.9 : e.type === 'elite' ? 1.3 : 0.95;
    const stop = e.type === 'hunter' ? 120 : 90;

    if (Math.abs(dx) > stop) {
      e.vx     = dx > 0 ? spd : -spd;
      e.facing = dx > 0 ? 1 : -1;
    } else { e.vx *= 0.75; }

    physics(e);
    // clamp off screen edges
    if (e.x < -150) e.x = -150;
    if (e.x > W + 150) e.x = W + 150;
    if (e.vx !== 0) e.walkT++;

    e.shootCD--;
    if (e.shootCD <= 0) {
      enemyShoot(e);
      const base = e.type === 'hunter' ? 80 : e.type === 'elite' ? 55 : 100;
      e.shootCD = base + Math.random() * 60;
    }
  }
  enemies = enemies.filter(e => !e.dead);

  if (enemies.length === 0) {
    gs = 'wave_clear';
    waveTimer = 200;
    player.shield = Math.min(100, player.shield + 35);
  }

  // ── Player bullets vs enemies
  for (const b of bullets) {
    b.x += b.vx; b.y += b.vy; b.life--;
    for (const e of enemies) {
      if (e.dead) continue;
      if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
        b.life = 0;
        spark(b.x, b.y, '#ffe844', 4);
        e.hp--;
        if (e.hp <= 0) {
          e.dead = true; sfxDeath();
          const col = e.type === 'hunter' ? '#00ffcc' : e.type === 'elite' ? '#ff5500' : '#5588ff';
          spark(e.x + e.w/2, e.y + e.h/2, col, 18);
          shake(4, 12);
          score += e.type === 'hunter' ? 1000 : e.type === 'elite' ? 500 : 100;
          if (Math.random() < 0.35)
            pickups.push({ x: e.x + e.w/2, y: e.y, type: 'ammo', life: 350 });
        }
      }
    }
  }
  bullets = bullets.filter(b => b.life > 0 && b.x > -20 && b.x < W + 20);

  // ── Enemy bullets vs player
  for (const b of eBullets) {
    b.x += b.vx; b.y += b.vy; b.life--;
    if (player.invincible === 0 &&
        b.x > player.x && b.x < player.x + player.w &&
        b.y > player.y && b.y < player.y + player.h) {
      b.life = 0; sfxHit();
      spark(b.x, b.y, b.col, 6);
      player.lastHit = Date.now();
      if (player.shield > 0) {
        player.shield = Math.max(0, player.shield - b.dmg);
      } else {
        player.health--;
        player.invincible = 100;
        shake(6, 22);
        if (player.health <= 0) {
          gs = 'gameover';
          if (score > highScore) highScore = score;
        }
      }
    }
  }
  eBullets = eBullets.filter(b => b.life > 0 && b.x > -50 && b.x < W+50 && b.y < H+50);

  // ── Particles
  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.vx *= 0.94; p.life--; }
  particles = particles.filter(p => p.life > 0);

  // ── Pickups
  for (const pk of pickups) {
    pk.life--;
    if (Math.abs((pk.x) - (player.x + 14)) < 26 && Math.abs(pk.y - (player.y + 24)) < 36) {
      if (pk.type === 'ammo') { player.ammo = Math.min(player.maxAmmo, player.ammo + 16); sfxPickup(); }
      pk.life = 0;
    }
  }
  pickups = pickups.filter(pk => pk.life > 0);
}

// ── DRAW HELPERS ──────────────────────────────
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── SPRITE: Master Chief ───────────────────────
function drawChief(x, y, facing, walkT, shield, inv) {
  ctx.save();
  ctx.translate(x + 14, y);
  if (facing === -1) ctx.scale(-1, 1);
  if (inv > 0 && Math.floor(inv / 5) % 2 === 0) ctx.globalAlpha = 0.35;

  const lo = Math.sin(walkT * 0.22) * 5;

  // Legs
  ctx.fillStyle = '#1a5c1a';
  ctx.fillRect(-7, 28, 8, 17 + Math.max(0, lo));
  ctx.fillStyle = '#166616';
  ctx.fillRect(1, 28, 8, 17 + Math.max(0, -lo));
  ctx.fillStyle = '#111';
  ctx.fillRect(-8, 44 + Math.max(0, lo),  10, 5);
  ctx.fillRect(0,  44 + Math.max(0, -lo), 10, 5);

  // Torso
  const tg = ctx.createLinearGradient(-11, 14, 11, 14);
  tg.addColorStop(0, '#1e7a1e'); tg.addColorStop(0.5, '#2baa2b'); tg.addColorStop(1, '#1e7a1e');
  ctx.fillStyle = tg;
  ctx.fillRect(-11, 15, 24, 16);

  // Chest highlights
  ctx.fillStyle = 'rgba(120,255,120,0.12)';
  ctx.fillRect(-9, 16, 10, 7);
  ctx.fillRect(3, 16, 7, 7);

  // Shoulders
  ctx.fillStyle = '#155215';
  ctx.fillRect(-14, 13, 9, 11);
  ctx.fillRect(7, 13, 9, 11);
  ctx.fillStyle = '#20821a';
  ctx.fillRect(-13, 12, 8, 4);
  ctx.fillRect(7, 12, 8, 4);

  // Arms
  ctx.fillStyle = '#1a6a1a';
  ctx.fillRect(-15, 17, 6, 15);
  ctx.fillRect(10, 17, 6, 15);

  // MA5B Assault Rifle
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(12, 25, 18, 6);
  ctx.fillStyle = '#444';
  ctx.fillRect(12, 23, 11, 4);
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(28, 26, 4, 4);
  ctx.fillStyle = '#555';
  ctx.fillRect(14, 29, 12, 3);
  // Stock
  ctx.fillStyle = '#333';
  ctx.fillRect(10, 26, 4, 8);

  // Neck
  ctx.fillStyle = '#155215';
  ctx.fillRect(-3, 9, 8, 8);

  // Helmet body
  const hg = ctx.createLinearGradient(-10, 0, 10, 0);
  hg.addColorStop(0, '#1c6e1c'); hg.addColorStop(0.45, '#2fa02f'); hg.addColorStop(1, '#1c6e1c');
  ctx.fillStyle = hg;
  roundRect(-10, -3, 22, 16, 7); ctx.fill();

  // Visor
  const vg = ctx.createLinearGradient(-7, 2, 7, 8);
  vg.addColorStop(0, '#ff9900'); vg.addColorStop(1, '#cc5500');
  ctx.fillStyle = vg;
  roundRect(-7, 2, 16, 7, 2); ctx.fill();
  // Visor shine
  ctx.fillStyle = 'rgba(255,230,120,0.45)';
  ctx.fillRect(-5, 3, 7, 3);

  // Helmet ridge
  ctx.fillStyle = '#0f4f0f';
  ctx.fillRect(-2, -5, 6, 5);
  ctx.fillStyle = '#1a7a1a';
  ctx.fillRect(-1, -6, 4, 2);

  // Shield bubble when low
  if (shield < 30) {
    ctx.strokeStyle = `rgba(255,60,60,${0.25 + Math.sin(Date.now()*0.012)*0.25})`;
    ctx.lineWidth = 2.5;
    roundRect(-15, -6, 32, 55, 10); ctx.stroke();
  }

  ctx.restore();
}

// ── SPRITE: Grunt ─────────────────────────────
function drawGrunt(x, y, facing, walkT) {
  ctx.save();
  ctx.translate(x + 12, y);
  if (facing === -1) ctx.scale(-1, 1);

  const lo = Math.sin(walkT * 0.28) * 4;

  // Legs
  ctx.fillStyle = '#3355aa';
  ctx.fillRect(-5, 22, 7, 10 + Math.max(0, lo));
  ctx.fillRect(2, 22, 7, 10 + Math.max(0, -lo));

  // Body
  ctx.fillStyle = '#4466bb';
  ctx.fillRect(-9, 8, 20, 18);
  ctx.fillStyle = '#3355aa';
  ctx.fillRect(-7, 6, 16, 5);

  // Backpack (methane)
  ctx.fillStyle = '#2244aa';
  ctx.fillRect(-12, 6, 5, 14);
  ctx.fillStyle = '#4499cc';
  ctx.fillRect(-11, 8, 3, 3);

  // Head
  ctx.fillStyle = '#5577cc';
  ctx.beginPath(); ctx.arc(1, 0, 11, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#4466bb';
  ctx.beginPath(); ctx.arc(1, 0, 11, Math.PI, Math.PI * 2); ctx.fill();

  // Eyes
  ctx.fillStyle = '#ff1111';
  ctx.fillRect(-5, -4, 5, 4);
  ctx.fillRect(2, -4, 5, 4);
  ctx.fillStyle = '#ff6666';
  ctx.fillRect(-4, -3, 3, 2);
  ctx.fillRect(3, -3, 3, 2);

  // Methane mask
  ctx.fillStyle = '#8899cc';
  ctx.fillRect(-5, 3, 13, 6);
  ctx.fillStyle = '#aabbdd';
  ctx.fillRect(-3, 4, 9, 2);

  // Plasma pistol
  ctx.fillStyle = '#7733cc';
  ctx.fillRect(9, 12, 11, 5);
  ctx.fillStyle = '#9955ee';
  ctx.fillRect(9, 10, 7, 4);
  ctx.fillStyle = '#aa66ff';
  ctx.fillRect(18, 11, 5, 5);

  ctx.restore();
}

// ── SPRITE: Elite ─────────────────────────────
function drawElite(x, y, facing, walkT) {
  ctx.save();
  ctx.translate(x + 16, y);
  if (facing === -1) ctx.scale(-1, 1);

  const lo = Math.sin(walkT * 0.22) * 5;

  // Legs
  ctx.fillStyle = '#880011';
  ctx.fillRect(-8, 36, 9, 20 + Math.max(0, lo));
  ctx.fillRect(2, 36, 9, 20 + Math.max(0, -lo));
  ctx.fillStyle = '#550009';
  ctx.fillRect(-9, 55 + Math.max(0, lo), 11, 4);
  ctx.fillRect(1, 55 + Math.max(0, -lo), 11, 4);

  // Body
  ctx.fillStyle = '#aa0022';
  ctx.fillRect(-13, 18, 28, 22);
  ctx.fillStyle = '#cc0033';
  ctx.fillRect(-11, 14, 24, 7);
  // Chest plate
  ctx.fillStyle = 'rgba(255,50,50,0.25)';
  ctx.fillRect(-9, 19, 9, 10);
  ctx.fillRect(2, 19, 9, 10);
  // Spine ridge
  ctx.fillStyle = '#770011';
  ctx.fillRect(-2, 18, 6, 22);

  // Arms
  ctx.fillStyle = '#990011';
  ctx.fillRect(-17, 18, 7, 20);
  ctx.fillRect(12, 18, 7, 20);

  // Plasma rifle
  ctx.fillStyle = '#553366';
  ctx.fillRect(14, 28, 20, 8);
  ctx.fillStyle = '#774499';
  ctx.fillRect(14, 25, 12, 5);
  ctx.fillStyle = '#ff4400';
  ctx.beginPath(); ctx.arc(33, 32, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff8844';
  ctx.beginPath(); ctx.arc(33, 32, 2, 0, Math.PI*2); ctx.fill();

  // Head
  ctx.fillStyle = '#cc1133';
  ctx.fillRect(-9, 0, 20, 18);
  // Mandibles
  ctx.fillStyle = '#880022';
  ctx.fillRect(-12, 10, 5, 12);
  ctx.fillRect(9, 10, 5, 12);
  ctx.fillStyle = '#cc1133';
  ctx.fillRect(-10, 10, 3, 8);
  ctx.fillRect(9, 10, 3, 8);

  // Eyes
  ctx.fillStyle = '#ff6600';
  ctx.fillRect(-6, 4, 6, 5);
  ctx.fillRect(2, 4, 6, 5);
  ctx.fillStyle = '#ffcc00';
  ctx.fillRect(-5, 5, 4, 3);
  ctx.fillRect(3, 5, 4, 3);

  // Crest
  ctx.fillStyle = '#880011';
  ctx.beginPath(); ctx.moveTo(-4, 0); ctx.lineTo(1, -10); ctx.lineTo(6, 0); ctx.fill();
  ctx.fillStyle = '#aa0022';
  ctx.beginPath(); ctx.moveTo(-2, 0); ctx.lineTo(1, -7); ctx.lineTo(4, 0); ctx.fill();

  ctx.restore();
}

// ── SPRITE: Hunter ─────────────────────────────
function drawHunter(x, y, facing, walkT) {
  ctx.save();
  ctx.translate(x + 20, y);
  if (facing === -1) ctx.scale(-1, 1);

  const lo = Math.sin(walkT * 0.15) * 6;

  // Legs (massive)
  ctx.fillStyle = '#004422';
  ctx.fillRect(-10, 46, 12, 22 + Math.max(0, lo));
  ctx.fillRect(4, 46, 12, 22 + Math.max(0, -lo));
  ctx.fillStyle = '#002211';
  ctx.fillRect(-12, 66 + Math.max(0, lo), 15, 6);
  ctx.fillRect(3, 66 + Math.max(0, -lo), 15, 6);

  // Body (wide + armored)
  ctx.fillStyle = '#006633';
  ctx.fillRect(-16, 20, 34, 30);
  ctx.fillStyle = '#008844';
  ctx.fillRect(-14, 16, 30, 8);
  // Armor plates
  ctx.fillStyle = '#004422';
  ctx.fillRect(-15, 21, 6, 20);
  ctx.fillRect(11, 21, 6, 20);
  ctx.fillStyle = 'rgba(0,255,150,0.15)';
  ctx.fillRect(-10, 22, 22, 12);

  // Arms
  ctx.fillStyle = '#005522';
  ctx.fillRect(-20, 22, 8, 24);
  ctx.fillRect(14, 22, 8, 24);

  // Fuel rod cannon
  ctx.fillStyle = '#003311';
  ctx.fillRect(18, 30, 24, 12);
  ctx.fillStyle = '#005533';
  ctx.fillRect(18, 27, 16, 6);
  ctx.fillStyle = '#00ffcc';
  ctx.beginPath(); ctx.arc(40, 36, 7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#aaffee';
  ctx.beginPath(); ctx.arc(40, 36, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(40, 36, 2, 0, Math.PI*2); ctx.fill();

  // Shield (left arm)
  ctx.fillStyle = '#004422';
  ctx.fillRect(-24, 20, 8, 30);
  ctx.fillStyle = '#008844';
  ctx.fillRect(-23, 21, 6, 28);
  ctx.fillStyle = 'rgba(0,255,150,0.2)';
  ctx.fillRect(-23, 21, 4, 28);

  // Head (small relative to body)
  ctx.fillStyle = '#007744';
  ctx.fillRect(-6, 2, 14, 20);
  ctx.fillStyle = '#005533';
  ctx.fillRect(-8, 0, 18, 5);

  // Eyes (glowing)
  ctx.fillStyle = '#00ffcc';
  ctx.fillRect(-4, 5, 5, 5);
  ctx.fillRect(1, 5, 5, 5);
  ctx.fillStyle = '#aaffee';
  ctx.fillRect(-3, 6, 3, 3);
  ctx.fillRect(2, 6, 3, 3);

  // Mouth tentacles
  ctx.fillStyle = '#005533';
  ctx.fillRect(-5, 14, 3, 8);
  ctx.fillRect(-1, 16, 3, 6);
  ctx.fillRect(4, 14, 3, 8);

  ctx.restore();
}

// ── DRAW BACKGROUND ───────────────────────────
function drawBG() {
  // Sky gradient
  const sg = ctx.createLinearGradient(0, 0, 0, H);
  sg.addColorStop(0, '#000a12'); sg.addColorStop(0.55, '#001322'); sg.addColorStop(1, '#002214');
  ctx.fillStyle = sg; ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of STARS) {
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Halo ring
  ctx.save();
  ctx.globalAlpha = 0.13;
  ctx.strokeStyle = '#88ffaa';
  ctx.lineWidth = 10;
  ctx.beginPath(); ctx.ellipse(400, -30, 330, 145, 0, 0, Math.PI*2); ctx.stroke();
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#55ff77';
  ctx.beginPath(); ctx.ellipse(400, -30, 320, 135, 0, 0, Math.PI*2); ctx.stroke();
  ctx.globalAlpha = 0.06;
  ctx.strokeStyle = '#aaffcc';
  ctx.lineWidth = 28;
  ctx.beginPath(); ctx.ellipse(400, -30, 330, 145, 0, 0, Math.PI*2); ctx.stroke();
  ctx.restore();

  // Platforms
  for (const p of platforms) {
    if (p.h > 20) {
      const gg = ctx.createLinearGradient(0, p.y, 0, p.y + p.h);
      gg.addColorStop(0, '#1e4d1e'); gg.addColorStop(0.08, '#163816'); gg.addColorStop(1, '#080e08');
      ctx.fillStyle = gg;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      // glow edge
      ctx.fillStyle = 'rgba(60,255,60,0.18)';
      ctx.fillRect(p.x, p.y, p.w, 2);
      ctx.fillStyle = 'rgba(40,200,40,0.1)';
      ctx.fillRect(p.x, p.y + 2, p.w, 1);
    } else {
      ctx.fillStyle = '#1a3d1a';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = 'rgba(80,255,80,0.3)';
      ctx.fillRect(p.x, p.y, p.w, 2);
      ctx.fillStyle = '#0a1e0a';
      ctx.fillRect(p.x, p.y + p.h - 2, p.w, 2);
      // Platform glow underneath
      const pg = ctx.createLinearGradient(0, p.y + p.h, 0, p.y + p.h + 12);
      pg.addColorStop(0, 'rgba(40,180,40,0.08)');
      pg.addColorStop(1, 'transparent');
      ctx.fillStyle = pg;
      ctx.fillRect(p.x, p.y + p.h, p.w, 12);
    }
  }
}

// ── DRAW HUD ──────────────────────────────────
function drawHUD() {
  ctx.save();
  // Shield bar
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  roundRect(14, 14, 208, 20, 3); ctx.fill();
  const sc = player.shield > 50 ? '#22ffcc' : player.shield > 25 ? '#ffaa00' : '#ff2222';
  ctx.fillStyle = sc;
  roundRect(16, 16, Math.max(0, player.shield * 2.04), 16, 2); ctx.fill();
  ctx.strokeStyle = '#33ddcc'; ctx.lineWidth = 1;
  roundRect(14, 14, 208, 20, 3); ctx.stroke();
  ctx.fillStyle = '#33ddcc'; ctx.font = 'bold 9px Courier New';
  ctx.fillText('SHIELDS', 18, 28);

  // Health pips
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i < player.health ? '#ff3344' : '#2a0a10';
    roundRect(14 + i*26, 38, 22, 12, 2); ctx.fill();
    ctx.strokeStyle = '#ff5566'; ctx.lineWidth = 1;
    roundRect(14 + i*26, 38, 22, 12, 2); ctx.stroke();
  }
  ctx.fillStyle = '#ff7788'; ctx.font = 'bold 8px Courier New';
  ctx.fillText('HEALTH', 90, 47);

  // Ammo
  const astr = player.reloading
    ? `RELOADING ${Math.ceil(player.reloadTimer/65)}s`
    : `AMMO  ${player.ammo}/${player.maxAmmo}`;
  ctx.fillStyle = player.ammo === 0 ? '#ff4444' : player.reloading ? '#ffaa00' : '#ccff44';
  ctx.font = 'bold 11px Courier New';
  ctx.fillText(astr, 14, 66);

  // Score (top right)
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 13px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText(`SCORE  ${score.toString().padStart(6,'0')}`, W - 14, 28);
  ctx.fillStyle = '#888';
  ctx.font = '10px Courier New';
  ctx.fillText(`BEST  ${highScore.toString().padStart(6,'0')}`, W - 14, 44);
  ctx.textAlign = 'left';

  // Wave (center)
  ctx.fillStyle = '#ffee44'; ctx.font = 'bold 12px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(`── WAVE ${wave} ──`, W/2, 26);
  ctx.fillStyle = enemies.length > 0 ? '#ff8844' : '#44ff88';
  ctx.font = '10px Courier New';
  ctx.fillText(`ENEMIES: ${enemies.length}`, W/2, 42);
  ctx.textAlign = 'left';

  // Controls
  ctx.fillStyle = 'rgba(120,180,120,0.4)';
  ctx.font = '8px Courier New';
  ctx.fillText('A/D: Move   W/SPACE: Jump   CLICK: Fire   R: Reload', 14, H - 7);
  ctx.restore();
}

// ── DRAW MENU ─────────────────────────────────
function drawMenu() {
  drawBG();
  ctx.save();
  ctx.textAlign = 'center';

  // Decorative ring
  ctx.globalAlpha = 0.08;
  ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 60;
  ctx.beginPath(); ctx.ellipse(W/2, H/2 + 60, 280, 120, 0, 0, Math.PI*2); ctx.stroke();
  ctx.globalAlpha = 1;

  ctx.shadowColor = '#00ff66'; ctx.shadowBlur = 40;
  ctx.fillStyle = '#00ff66'; ctx.font = 'bold 72px Courier New';
  ctx.fillText('HALO', W/2, 155);

  ctx.shadowBlur = 8;
  ctx.fillStyle = '#aaffaa'; ctx.font = 'bold 20px Courier New';
  ctx.fillText('ARCADE COMBAT', W/2, 193);

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#557755'; ctx.font = '12px Courier New';
  ctx.fillText('── CONTROLS ──', W/2, 250);
  const ctrls = ['A / D  —  Move', 'W / ↑ / SPACE  —  Jump', 'CLICK / HOLD  —  Shoot', 'R  —  Reload'];
  ctx.fillStyle = '#889988'; ctx.font = '11px Courier New';
  ctrls.forEach((c, i) => ctx.fillText(c, W/2, 272 + i*18));

  const pulse = 0.65 + Math.sin(Date.now() * 0.004) * 0.35;
  ctx.fillStyle = `rgba(0,255,100,${pulse})`;
  ctx.font = 'bold 15px Courier New';
  ctx.fillText('▶  CLICK OR PRESS SPACE TO BEGIN  ◀', W/2, 400);

  if (highScore > 0) {
    ctx.fillStyle = '#ffee44'; ctx.font = '12px Courier New';
    ctx.fillText(`BEST SCORE:  ${highScore}`, W/2, 432);
  }

  ctx.restore();
}

// ── DRAW GAME OVER ────────────────────────────
function drawGameOver() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  ctx.shadowColor = '#ff1122'; ctx.shadowBlur = 24;
  ctx.fillStyle = '#ff1122'; ctx.font = 'bold 58px Courier New';
  ctx.fillText('GAME OVER', W/2, 200);

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff'; ctx.font = 'bold 18px Courier New';
  ctx.fillText(`SCORE:  ${score}`, W/2, 255);
  ctx.fillStyle = '#ffee44'; ctx.font = '14px Courier New';
  ctx.fillText(`BEST:   ${highScore}`, W/2, 278);
  ctx.fillStyle = '#aaaaaa'; ctx.font = '12px Courier New';
  ctx.fillText(`WAVE REACHED:  ${wave}`, W/2, 302);

  const pulse = 0.65 + Math.sin(Date.now() * 0.005) * 0.35;
  ctx.fillStyle = `rgba(0,255,100,${pulse})`;
  ctx.font = 'bold 15px Courier New';
  ctx.fillText('▶  CLICK OR PRESS SPACE TO RETRY  ◀', W/2, 385);

  ctx.restore();
}

// ── DRAW WAVE CLEAR ───────────────────────────
function drawWaveClear() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,18,0,0.48)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  ctx.shadowColor = '#00ff66'; ctx.shadowBlur = 14;
  ctx.fillStyle = '#00ff66'; ctx.font = 'bold 34px Courier New';
  ctx.fillText(`WAVE ${wave - 1} CLEARED!`, W/2, 210);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#aaffaa'; ctx.font = '17px Courier New';
  ctx.fillText(`NEXT WAVE IN  ${Math.ceil(waveTimer / 60)}...`, W/2, 260);
  ctx.fillStyle = '#55aa55'; ctx.font = '12px Courier New';
  ctx.fillText('SHIELDS PARTIALLY RESTORED', W/2, 290);

  ctx.restore();
}

// ── RENDER ────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(shakeX, shakeY);

  if (gs === 'menu') { drawBG(); drawMenu(); ctx.restore(); return; }

  drawBG();

  // Pickups
  for (const pk of pickups) {
    const p = 0.7 + Math.sin(Date.now() * 0.008) * 0.3;
    ctx.save();
    ctx.globalAlpha = p;
    ctx.fillStyle = '#ccff44';
    ctx.fillRect(pk.x - 10, pk.y - 2, 20, 10);
    ctx.fillStyle = '#eeff88';
    ctx.fillRect(pk.x - 8, pk.y, 16, 4);
    ctx.fillStyle = '#aacc22';
    ctx.font = 'bold 8px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('AMMO', pk.x, pk.y - 5);
    ctx.textAlign = 'left';
    ctx.restore();
  }

  // Particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life / p.ml);
    ctx.fillStyle = p.col;
    ctx.shadowColor = p.col; ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Enemy bullets
  for (const b of eBullets) {
    ctx.save();
    ctx.fillStyle = b.col;
    ctx.shadowColor = b.col; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    // Trail
    ctx.globalAlpha = 0.3;
    ctx.beginPath(); ctx.arc(b.x - b.vx*1.5, b.y - b.vy*1.5, b.r * 0.7, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Player bullets
  for (const b of bullets) {
    ctx.save();
    ctx.fillStyle = '#ffe044';
    ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 8;
    ctx.fillRect(b.x - 8, b.y - 2, 14, 4);
    ctx.fillStyle = '#fff';
    ctx.fillRect(b.x - 6, b.y - 1, 6, 2);
    ctx.restore();
  }

  // Enemies
  for (const e of enemies) {
    if (e.dead) continue;
    if (e.type === 'grunt')  drawGrunt(e.x, e.y, e.facing, e.walkT);
    else if (e.type === 'elite') drawElite(e.x, e.y, e.facing, e.walkT);
    else if (e.type === 'hunter') drawHunter(e.x, e.y, e.facing, e.walkT);

    // HP bar
    const hp = e.hp / e.maxHp;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(e.x, e.y - 9, e.w, 5);
    ctx.fillStyle = hp > 0.5 ? '#44ff44' : hp > 0.25 ? '#ffaa22' : '#ff2222';
    ctx.fillRect(e.x, e.y - 9, e.w * hp, 5);
    ctx.strokeStyle = '#224422'; ctx.lineWidth = 0.5;
    ctx.strokeRect(e.x, e.y - 9, e.w, 5);
  }

  // Player
  if (gs === 'playing' || gs === 'wave_clear') {
    drawChief(player.x, player.y, player.facing, player.walkT, player.shield, player.invincible);
  }

  drawHUD();

  if (gs === 'gameover')   drawGameOver();
  if (gs === 'wave_clear') drawWaveClear();

  ctx.restore();
}

// ── GAME LOOP ─────────────────────────────────
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

loop();
</script>
